<div class="flex flex-col gap-1">
  @if (label) {
    <label class="text-sm font-medium text-gray-700">
      {{ label }}
      @if (required) {
        <span class="text-red-500 ml-0.5">*</span>
      }
    </label>
  }
  <div class="relative">
    @if (leftIcon) {
      <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
        <lucide-icon [img]="leftIcon" [size]="14"></lucide-icon>
      </span>
    }
    <select
      [class]="selectClass"
      [(ngModel)]="value"
      [disabled]="disabled"
      (ngModelChange)="onNgModelChange($event)"
    >
      @if (placeholder) {
        <option value="">{{ placeholder }}</option>
      }
      @for (opt of options; track opt.value) {
        <option [value]="opt.value">{{ opt.label }}</option>
      }
    </select>
    <lucide-icon [img]="ChevronDown" [size]="14" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></lucide-icon>
  </div>
  @if (error) {
    <p class="text-xs text-red-500">{{ error }}</p>
  }
</div>
