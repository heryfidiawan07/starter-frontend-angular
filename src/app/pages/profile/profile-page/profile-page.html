<app-main-layout title="My Profile">
  <div class="max-w-xl space-y-5">
    <!-- Photo section -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-800 mb-4">Profile Photo</h2>
      <div class="flex items-center gap-5">
        <app-avatar [src]="user?.photo ?? null" [name]="user?.name ?? ''" size="lg"></app-avatar>
        <div>
          <p class="font-medium text-gray-800">{{ user?.name }}</p>
          <p class="text-sm text-gray-400">{{ user?.email }}</p>
          <div class="flex items-center gap-2 mt-1.5">
            @if (user?.is_root) {
              <app-badge variant="info">Root</app-badge>
            }
            @if (user?.role) {
              <app-badge variant="gray">{{ user!.role!.name }}</app-badge>
            }
          </div>
          <app-btn variant="outline" size="sm" [icon]="Camera" class="mt-3" (click)="photoOpen.set(true)">
            Change Photo
          </app-btn>
        </div>
      </div>
    </div>

    <!-- Profile info -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-800 mb-4">Profile Information</h2>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <app-input formControlName="name" label="Full Name" [required]="true" placeholder="John Doe" [error]="nameError"></app-input>
        <app-input formControlName="username" label="Username" placeholder="johndoe"></app-input>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">Email</label>
          <input
            type="email"
            [value]="user?.email ?? ''"
            disabled
            class="w-full rounded-lg border border-gray-300 bg-gray-50 text-sm text-gray-900 placeholder-gray-400 px-3 py-2 h-9 cursor-not-allowed"
          />
        </div>
        <app-btn type="submit" [loading]="loading()" [icon]="Save">Save Changes</app-btn>
      </form>
    </div>
  </div>

  <app-photo-upload-modal
    [open]="photoOpen()"
    [user]="user"
    [isProfile]="true"
    (closed)="photoOpen.set(false)"
    (success)="handlePhotoSuccess()"
  ></app-photo-upload-modal>
</app-main-layout>
