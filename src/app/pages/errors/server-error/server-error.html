<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center">
  <div class="text-8xl font-bold text-gray-200 leading-none select-none mb-4">500</div>
  <h1 class="text-2xl font-bold text-gray-900">Internal Server Error</h1>
  <p class="text-gray-500 mt-2 max-w-md text-sm">
    Something went wrong on our end. Please try refreshing the page. If the problem persists, contact support.
  </p>
  <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
    <app-btn variant="outline" [icon]="RefreshCw" (click)="retry()">Retry</app-btn>
    <app-btn [icon]="Home" (click)="goHome()">Go Home</app-btn>
  </div>
</div>
