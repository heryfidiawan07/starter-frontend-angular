<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center">
  <div class="text-8xl font-bold text-gray-200 leading-none select-none mb-4">404</div>
  <h1 class="text-2xl font-bold text-gray-900">Page Not Found</h1>
  <p class="text-gray-500 mt-2 max-w-md text-sm">
    The page you're looking for doesn't exist or has been moved. Check the URL or head back to the home page.
  </p>
  <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
    <a routerLink="/">
      <app-btn [icon]="Home">Go Home</app-btn>
    </a>
  </div>
</div>
