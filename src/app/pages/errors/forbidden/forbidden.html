<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center">
  <div class="text-8xl font-bold text-gray-200 leading-none select-none mb-4">403</div>
  <h1 class="text-2xl font-bold text-gray-900">Access Forbidden</h1>
  <p class="text-gray-500 mt-2 max-w-md text-sm">
    You don't have permission to view this page. Contact your administrator if you believe this is a mistake.
  </p>
  <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
    <app-btn variant="outline" [icon]="ArrowLeft" (click)="goBack()">Go Back</app-btn>
    <app-btn [icon]="LayoutDashboard" (click)="goDashboard()">Dashboard</app-btn>
  </div>
</div>
