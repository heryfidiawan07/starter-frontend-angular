<app-auth-layout title="Create Account" subtitle="Fill in the form to get started">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <app-input
      formControlName="name"
      label="Full Name"
      [required]="true"
      placeholder="John Doe"
      [leftIcon]="User"
      [error]="getError('name')"
    ></app-input>

    <app-input
      formControlName="email"
      label="Email"
      type="email"
      [required]="true"
      placeholder="you@example.com"
      [leftIcon]="Mail"
      [error]="getError('email')"
    ></app-input>

    <app-input
      formControlName="username"
      label="Username"
      placeholder="johndoe"
      [leftIcon]="AtSign"
      [error]="getError('username')"
    ></app-input>

    <!-- Password field with toggle -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">
        Password <span class="text-red-500 ml-0.5">*</span>
      </label>
      <div class="relative flex items-center">
        <span class="absolute left-3 text-gray-400 pointer-events-none">
          <lucide-icon [img]="Lock" [size]="15"></lucide-icon>
        </span>
        <input
          formControlName="password"
          [type]="showPw() ? 'text' : 'password'"
          placeholder="Min. 8 characters"
          [class]="'w-full rounded-lg border bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent pl-10 pr-10 py-2 h-9 ' + (getError('password') ? 'border-red-400 focus:ring-red-400' : 'border-gray-300')"
        />
        <span class="absolute right-3 flex items-center">
          <button type="button" (click)="showPw.set(!showPw())" class="text-gray-400 hover:text-gray-600">
            @if (showPw()) {
              <lucide-icon [img]="EyeOff" [size]="15"></lucide-icon>
            } @else {
              <lucide-icon [img]="Eye" [size]="15"></lucide-icon>
            }
          </button>
        </span>
      </div>
      @if (getError('password')) {
        <p class="text-xs text-red-500">{{ getError('password') }}</p>
      }
    </div>

    <app-btn type="submit" class="w-full" [loading]="loading()" [icon]="UserPlus">
      Create Account
    </app-btn>
  </form>

  <p class="mt-5 text-center text-sm text-gray-500">
    Already have an account?
    <a routerLink="/login" class="text-primary-600 font-medium hover:underline">Sign in</a>
  </p>
</app-auth-layout>
