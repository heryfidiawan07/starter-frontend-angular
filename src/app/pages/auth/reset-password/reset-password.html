<app-auth-layout title="Reset Password" subtitle="Enter your new password below">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- New Password -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">
        New Password <span class="text-red-500 ml-0.5">*</span>
      </label>
      <div class="relative flex items-center">
        <span class="absolute left-3 text-gray-400 pointer-events-none">
          <lucide-icon [img]="Lock" [size]="15"></lucide-icon>
        </span>
        <input
          formControlName="new_password"
          [type]="showPw() ? 'text' : 'password'"
          placeholder="Min. 8 characters"
          [class]="'w-full rounded-lg border bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent pl-10 pr-10 py-2 h-9 ' + (getError('new_password') ? 'border-red-400 focus:ring-red-400' : 'border-gray-300')"
        />
        <span class="absolute right-3 flex items-center">
          <button type="button" (click)="showPw.set(!showPw())" class="text-gray-400 hover:text-gray-600">
            @if (showPw()) {
              <lucide-icon [img]="EyeOff" [size]="15"></lucide-icon>
            } @else {
              <lucide-icon [img]="Eye" [size]="15"></lucide-icon>
            }
          </button>
        </span>
      </div>
      @if (getError('new_password')) {
        <p class="text-xs text-red-500">{{ getError('new_password') }}</p>
      }
    </div>

    <!-- Confirm Password -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">
        Confirm Password <span class="text-red-500 ml-0.5">*</span>
      </label>
      <div class="relative flex items-center">
        <span class="absolute left-3 text-gray-400 pointer-events-none">
          <lucide-icon [img]="Lock" [size]="15"></lucide-icon>
        </span>
        <input
          formControlName="confirm_password"
          [type]="showPw() ? 'text' : 'password'"
          placeholder="Repeat new password"
          [class]="'w-full rounded-lg border bg-white text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent pl-10 pr-3 py-2 h-9 ' + (getError('confirm_password') ? 'border-red-400 focus:ring-red-400' : 'border-gray-300')"
        />
      </div>
      @if (getError('confirm_password')) {
        <p class="text-xs text-red-500">{{ getError('confirm_password') }}</p>
      }
    </div>

    <app-btn type="submit" class="w-full" [loading]="loading()" [icon]="KeyRound">
      Reset Password
    </app-btn>

    <a routerLink="/login">
      <app-btn variant="ghost" class="w-full" [icon]="ArrowLeft">Back to Sign In</app-btn>
    </a>
  </form>
</app-auth-layout>
