<app-auth-layout title="Forgot Password" subtitle="Enter your email and we'll send you a reset link">
  @if (submitted()) {
    <div class="text-center space-y-4">
      <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto">
        <lucide-icon [img]="Mail" [size]="22" class="text-green-600"></lucide-icon>
      </div>
      <p class="text-sm text-gray-600">
        If the email exists in our system, you'll receive a password reset link shortly.
      </p>
      <a routerLink="/login">
        <app-btn variant="outline" class="w-full" [icon]="ArrowLeft">Back to Sign In</app-btn>
      </a>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <app-input
        formControlName="email"
        label="Email"
        type="email"
        [required]="true"
        placeholder="you@example.com"
        [leftIcon]="Mail"
        [error]="emailError"
      ></app-input>

      <app-btn type="submit" class="w-full" [loading]="loading()" [icon]="Send">
        Send Reset Link
      </app-btn>

      <a routerLink="/login">
        <app-btn variant="ghost" class="w-full" [icon]="ArrowLeft">Back to Sign In</app-btn>
      </a>
    </form>
  }
</app-auth-layout>
